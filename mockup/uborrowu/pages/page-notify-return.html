<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · แจ้งคืนครุภัณฑ์ (UC-09)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-2xl mx-auto">
    <a href="page-student-home.html" class="text-sm text-blue-600 hover:underline">← กลับหน้าหลัก</a>
    <h1 class="text-2xl font-bold text-gray-800 mt-2 mb-1">แจ้งคืนครุภัณฑ์</h1>
    <p class="text-sm text-gray-500 mb-6">รายการครุภัณฑ์ที่คุณกำลังยืมอยู่ — กดแจ้งคืนเมื่อพร้อมนำของมาคืนที่คลัง</p>
    <div id="rows" class="space-y-3"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() { notifyParentPage("notify-return"); render(); }
    function render() {
      const stu = currentUserId();
      const highlight = qparam("rid") ? Number(qparam("rid")) : null;
      const reqs = db("requests").filter(r => r.student_id === stu && r.status === "BORROWING");
      const host = document.getElementById("rows");
      if (reqs.length === 0) {
        host.innerHTML = `<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-10 text-center"><div class="text-4xl mb-2">✅</div><p class="text-gray-600 font-semibold">ไม่มีครุภัณฑ์ที่ต้องคืนในขณะนี้</p></div>`;
        return;
      }
      host.innerHTML = reqs.map(r => {
        const dleft = daysLeft(r.due_date);
        return `<div class="bg-white rounded-2xl border ${r.id === highlight ? 'border-blue-400 ring-2 ring-blue-100' : 'border-gray-200'} shadow-sm p-4 flex items-center justify-between gap-4">
          <div>
            <p class="text-xs text-gray-400 font-mono mb-1">คำขอ #${r.id}</p>
            <div class="text-sm text-gray-800">${r.items.map(it => { const i = itemById(it.item_id); return `${i.image} ${i.name} × ${it.qty}`; }).join("<br>")}</div>
            <p class="text-xs mt-1 ${dleft < 0 ? 'text-red-600 font-semibold' : 'text-gray-500'}">กำหนดคืน ${r.due_date} ${dleft < 0 ? `(เกินกำหนด ${Math.abs(dleft)} วัน)` : `(อีก ${dleft} วัน)`}</p>
          </div>
          <button onclick="notifyReturn(${r.id})" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl px-4 py-2 shrink-0">แจ้งคืน</button>
        </div>`;
      }).join("");
    }
    function notifyReturn(rid) {
      const reqs = db("requests");
      const r = reqs.find(x => x.id === rid);
      r.status = "RETURN_PENDING";
      r.return_notified_at = "2026-07-23 " + new Date().toTimeString().slice(0,5);
      dbSave("requests", reqs);
      toastBanner("แจ้งคืนสำเร็จ รอเจ้าหน้าที่ตรวจรับ");
      render();
    }
  </script>
</body>
</html>
