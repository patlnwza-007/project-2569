<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · เสนอแนะสิ่งของใหม่ (UC-13)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">เสนอแนะสิ่งของใหม่</h1>
    <p class="text-sm text-gray-500 mb-6">เสนอแนะสิ่งของที่ต้องการให้จัดซื้อ พร้อมติดตามสถานะการพิจารณา</p>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 mb-6 space-y-3">
      <div>
        <label class="text-sm font-semibold text-gray-700">ชื่อสิ่งของ <span class="text-red-500">*</span></label>
        <input id="f-name" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm">
      </div>
      <div>
        <label class="text-sm font-semibold text-gray-700">รายละเอียด <span class="text-red-500">*</span></label>
        <textarea id="f-detail" rows="3" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea>
      </div>
      <p id="err" class="hidden text-xs text-red-600">กรุณากรอกข้อมูลให้ครบก่อนส่ง</p>
      <button onclick="submitSuggestion()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl px-4 py-2">ส่งคำเสนอแนะ</button>
    </div>

    <h2 class="text-sm font-bold text-gray-700 mb-2">สถานะคำเสนอแนะของฉัน</h2>
    <div id="rows" class="space-y-2"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() { notifyParentPage("suggestion"); render(); }
    function render() {
      const stu = currentUserId();
      const mine = db("suggestions").filter(s => s.student_id === stu).sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""));
      const host = document.getElementById("rows");
      if (mine.length === 0) { host.innerHTML = `<p class="text-xs text-gray-400">ยังไม่เคยเสนอแนะสิ่งของ</p>`; return; }
      const statusMap = { PENDING: ["รอพิจารณา","amber"], APPROVED: ["อนุมัติแล้ว","green"], REJECTED: ["ปฏิเสธแล้ว","red"] };
      host.innerHTML = mine.map(s => {
        const [label, color] = statusMap[s.status];
        return `<div class="bg-white rounded-xl border border-gray-200 p-3 flex items-center justify-between">
          <div><p class="text-sm font-semibold text-gray-800">${s.name}</p><p class="text-xs text-gray-400">${s.detail}</p>
            ${s.status === 'REJECTED' && s.reject_reason ? `<p class="text-xs text-red-600 mt-0.5">เหตุผล: ${s.reject_reason}</p>` : ''}</div>
          <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-${color}-100 text-${color}-700 shrink-0">${label}</span>
        </div>`;
      }).join("");
    }
    function submitSuggestion() {
      const name = document.getElementById("f-name").value.trim();
      const detail = document.getElementById("f-detail").value.trim();
      if (!name || !detail) { document.getElementById("err").classList.remove("hidden"); return; }
      document.getElementById("err").classList.add("hidden");
      const list = db("suggestions");
      list.push({ id: nextId(list), student_id: currentUserId(), name, detail, status: "PENDING", created_at: "2026-07-23 " + new Date().toTimeString().slice(0,5) });
      dbSave("suggestions", list);
      document.getElementById("f-name").value = ""; document.getElementById("f-detail").value = "";
      toastBanner("ส่งคำเสนอแนะสำเร็จ รอเจ้าหน้าที่พิจารณา");
      render();
    }
  </script>
</body>
</html>
