<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · แผนผังตำแหน่งชั้นวาง (UC-04)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-4xl mx-auto">
    <div id="back-link"></div>
    <h1 class="text-2xl font-bold text-gray-800 mt-2 mb-1">แผนผังตำแหน่งชั้นวาง</h1>
    <p class="text-sm text-gray-500 mb-6">ตำแหน่งจัดเก็บของสิ่งของ จัดกลุ่มตามตู้/ชั้นวาง</p>
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() {
      notifyParentPage("position-map");
      const highlightId = qparam("id") ? Number(qparam("id")) : null;
      document.getElementById("back-link").innerHTML = highlightId
        ? `<a href="page-item-detail.html?id=${highlightId}" class="text-sm text-blue-600 hover:underline">← กลับไปรายละเอียดสิ่งของ</a>`
        : `<a href="page-student-home.html" class="text-sm text-blue-600 hover:underline">← กลับหน้าหลัก</a>`;

      const positions = db("positions");
      const items = db("items");
      const host = document.getElementById("grid");
      if (positions.length === 0) { host.innerHTML = `<div class="col-span-full bg-white rounded-2xl border border-dashed p-10 text-center text-gray-500">ยังไม่มีข้อมูลตำแหน่งจัดเก็บ</div>`; return; }

      host.innerHTML = positions.map(p => {
        const posItems = items.filter(i => i.position_id === p.id);
        return `<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4">
          <p class="font-bold text-blue-700 mb-2">📍 ${p.name}</p>
          ${posItems.length === 0 ? `<p class="text-xs text-gray-400">ไม่มีสิ่งของในตำแหน่งนี้</p>` :
            `<div class="flex flex-col gap-1.5">${posItems.map(i => `
              <div class="flex items-center gap-2 text-sm px-2 py-1.5 rounded-lg ${i.id === highlightId ? 'bg-yellow-100 ring-2 ring-yellow-400' : 'bg-gray-50'}">
                <span>${i.image}</span><span class="${i.id === highlightId ? 'font-semibold' : ''}">${i.name}</span>
              </div>`).join("")}</div>`}
        </div>`;
      }).join("");
    }
  </script>
</body>
</html>
