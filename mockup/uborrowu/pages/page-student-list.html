<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · รายชื่อนักศึกษา (UC-27)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">รายชื่อนักศึกษา</h1>
    <p class="text-sm text-gray-500 mb-4">ค้นหา/เรียงลำดับ เพื่อจัดการสิทธิ์การยืมของนักศึกษาแต่ละคน</p>
    <input id="q" oninput="render()" placeholder="ค้นหาชื่อ/รหัสนักศึกษา..." class="w-full mb-4 border border-gray-300 rounded-lg px-3 py-2 text-sm">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500"><tr>
          <th class="text-left px-4 py-2 cursor-pointer" onclick="sortBy('id')">รหัสนักศึกษา ⇅</th>
          <th class="text-left px-4 py-2 cursor-pointer" onclick="sortBy('name')">ชื่อ-นามสกุล ⇅</th>
          <th class="text-left px-4 py-2">สถานะ</th><th class="text-left px-4 py-2">จัดการ</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" class="hidden p-10 text-center text-gray-500">ไม่พบข้อมูล</div>
    </div>
  </div>
  <script src="../shared.js"></script>
  <script>
    let sortKey = "id", sortAsc = true;
    function init() { notifyParentPage("student-list"); render(); }
    function sortBy(key) { sortAsc = (sortKey === key) ? !sortAsc : true; sortKey = key; render(); }
    function render() {
      const q = document.getElementById("q").value.trim().toLowerCase();
      let list = db("students");
      if (q) list = list.filter(s => s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q));
      list = list.slice().sort((a,b) => { const r = String(a[sortKey]).localeCompare(String(b[sortKey])); return sortAsc ? r : -r; });
      document.getElementById("empty").classList.toggle("hidden", list.length !== 0);
      document.getElementById("rows").innerHTML = list.map(s => `<tr class="hover:bg-gray-50 border-t border-gray-100">
        <td class="px-4 py-2 font-mono text-xs">${s.id}</td><td class="px-4 py-2">${s.name}</td>
        <td class="px-4 py-2">${s.blocked ? '<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-red-100 text-red-700">ถูกระงับสิทธิ์</span>' : '<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-green-100 text-green-700">ปกติ</span>'}</td>
        <td class="px-4 py-2"><a href="page-student-permission.html?id=${s.id}" class="text-blue-600 text-xs hover:underline">จัดการสิทธิ์</a></td>
      </tr>`).join("");
    }
  </script>
</body>
</html>
