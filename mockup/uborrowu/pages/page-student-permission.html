<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · จัดการสิทธิ์การยืม (UC-28)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-xl mx-auto">
    <a href="page-student-list.html" class="text-sm text-blue-600 hover:underline">← กลับรายชื่อนักศึกษา</a>
    <div id="content" class="mt-3"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() {
      notifyParentPage("student-permission");
      const id = qparam("id");
      const stu = studentById(id);
      const host = document.getElementById("content");
      if (!stu) { host.innerHTML = `<div class="bg-white rounded-2xl border p-8 text-center text-gray-500">ไม่พบนักศึกษานี้</div>`; return; }
      host.innerHTML = `<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h1 class="text-lg font-bold text-gray-800">${stu.name} <span class="text-xs text-gray-400 font-mono font-normal">(${stu.id})</span></h1>
        <p class="text-sm mt-1">สถานะ: ${stu.blocked ? '<span class="text-red-600 font-semibold">ถูกระงับสิทธิ์</span>' : '<span class="text-green-600 font-semibold">ปกติ</span>'}</p>
        ${stu.blocked ? `<p class="text-xs text-gray-500 mt-1">เหตุผล: ${stu.block_reason}</p>` : ""}
        <div class="mt-4">
          <label class="text-sm font-semibold text-gray-700">วันครบกำหนดคืนที่กำหนดเอง (Deadline override)</label>
          <input id="f-deadline" type="date" value="${stu.deadline_override || ''}" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm">
          <button onclick="saveDeadline()" class="mt-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-lg px-3 py-1.5">บันทึกกำหนดคืน</button>
        </div>
        <div class="mt-5 pt-4 border-t border-gray-100">
          ${stu.blocked
            ? `<button onclick="unblock()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-xl px-4 py-2">ปลดบล็อก</button>`
            : `<button onclick="blockPrompt()" class="bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded-xl px-4 py-2">ระงับสิทธิ์ (Block)</button>`}
        </div>
      </div>`;
    }
    function saveDeadline() {
      const id = qparam("id"); const students = db("students");
      const stu = students.find(s => s.id === id);
      stu.deadline_override = document.getElementById("f-deadline").value || null;
      dbSave("students", students);
      toastBanner("บันทึกกำหนดคืนสำเร็จ");
    }
    function blockPrompt() {
      const reason = prompt("เหตุผลการระงับสิทธิ์");
      if (reason === null || !reason.trim()) { if(reason!==null) toastBanner("ต้องระบุเหตุผล","error"); return; }
      const id = qparam("id"); const students = db("students");
      const stu = students.find(s => s.id === id);
      stu.blocked = true; stu.block_reason = reason.trim();
      dbSave("students", students);
      toastBanner("ระงับสิทธิ์สำเร็จ");
      init();
    }
    function unblock() {
      const id = qparam("id"); const students = db("students");
      const stu = students.find(s => s.id === id);
      stu.blocked = false; stu.block_reason = "";
      dbSave("students", students);
      toastBanner("ปลดบล็อกสำเร็จ");
      init();
    }
  </script>
</body>
</html>
