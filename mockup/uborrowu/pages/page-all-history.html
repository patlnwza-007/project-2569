<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · ประวัติการยืม-คืนทั้งระบบ (UC-20)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">ประวัติการยืม-คืนทั้งระบบ</h1>
    <p class="text-sm text-gray-500 mb-4">ค้นหา/กรองตามชื่อนักศึกษาหรือช่วงวันที่</p>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 mb-4 flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-[200px]"><label class="text-xs font-semibold text-gray-500">ค้นหาชื่อ/รหัสนักศึกษา</label>
        <input id="q" oninput="render()" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="text-xs font-semibold text-gray-500">ตั้งแต่วันที่</label><input id="from" type="date" onchange="render()" class="mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="text-xs font-semibold text-gray-500">ถึงวันที่</label><input id="to" type="date" onchange="render()" class="mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-xs uppercase tracking-wider text-gray-500"><tr>
          <th class="text-left px-4 py-2">#</th><th class="text-left px-4 py-2">นักศึกษา</th><th class="text-left px-4 py-2">รายการ</th>
          <th class="text-left px-4 py-2">วันที่ส่งคำขอ</th><th class="text-left px-4 py-2">สถานะ</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" class="hidden p-10 text-center text-gray-500">ไม่พบข้อมูล</div>
    </div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() { notifyParentPage("all-history"); render(); }
    function render() {
      const q = document.getElementById("q").value.trim().toLowerCase();
      const from = document.getElementById("from").value;
      const to = document.getElementById("to").value;
      let reqs = db("requests");
      if (q) reqs = reqs.filter(r => { const s = studentById(r.student_id); return (s && s.name.toLowerCase().includes(q)) || r.student_id.toLowerCase().includes(q); });
      if (from) reqs = reqs.filter(r => r.created_at.slice(0,10) >= from);
      if (to) reqs = reqs.filter(r => r.created_at.slice(0,10) <= to);
      reqs = reqs.sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""));
      const host = document.getElementById("rows");
      document.getElementById("empty").classList.toggle("hidden", reqs.length !== 0);
      host.innerHTML = reqs.map(r => {
        const stu = studentById(r.student_id);
        return `<tr class="hover:bg-gray-50 border-t border-gray-100">
          <td class="px-4 py-2 font-mono text-xs">#${r.id}</td>
          <td class="px-4 py-2">${stu ? stu.name : r.student_id} <span class="text-xs text-gray-400 font-mono">(${r.student_id})</span></td>
          <td class="px-4 py-2 text-xs">${r.items.map(it=>itemById(it.item_id)?.name).join(", ")}</td>
          <td class="px-4 py-2 text-xs text-gray-500">${r.created_at}</td>
          <td class="px-4 py-2">${badgeHtml(r.status)}</td>
        </tr>`;
      }).join("");
    }
  </script>
</body>
</html>
