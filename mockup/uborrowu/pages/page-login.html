<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · เข้าสู่ระบบด้วย Google (UC-16)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-6" onload="notifyParentPage('login')">
  <div class="bg-white rounded-3xl shadow-xl p-8 max-w-md w-full">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🔐</div>
      <h1 class="text-lg font-bold text-gray-800">เข้าสู่ระบบด้วย Google OAuth 2.0</h1>
      <p class="text-xs text-gray-500 mt-1">ระบบจริง: redirect ไปยืนยันตัวตนกับ Google แล้วตรวจสอบอีเมลกับ Whitelist<br>(จำลอง: เลือกบัญชีทดสอบด้านล่างแทนการล็อกอิน Google จริง)</p>
    </div>

    <p class="text-xs font-semibold text-gray-500 mb-2">เลือกบัญชีทดสอบ (Whitelist ผ่าน)</p>
    <div class="flex flex-col gap-2 mb-4">
      <button onclick="loginAs('student')" class="flex items-center gap-3 border border-gray-300 rounded-xl px-4 py-3 text-sm hover:bg-blue-50 hover:border-blue-300 text-left">
        <span class="text-xl">🎓</span>
        <span><span class="font-semibold block">s001@ubu.ac.th</span><span class="text-xs text-gray-500">สมชาย ใจดี — นักศึกษา (Whitelist)</span></span>
      </button>
      <button onclick="loginAs('staff')" class="flex items-center gap-3 border border-gray-300 rounded-xl px-4 py-3 text-sm hover:bg-blue-50 hover:border-blue-300 text-left">
        <span class="text-xl">👷</span>
        <span><span class="font-semibold block">staff1@ubu.ac.th</span><span class="text-xs text-gray-500">อ.สมหญิง ดูแลดี — เจ้าหน้าที่ (Whitelist)</span></span>
      </button>
      <button onclick="loginAsOverride()" class="flex items-center gap-3 border border-gray-300 rounded-xl px-4 py-3 text-sm hover:bg-blue-50 hover:border-blue-300 text-left">
        <span class="text-xl">🌟</span>
        <span><span class="font-semibold block">s004@ubu.ac.th</span><span class="text-xs text-gray-500">Whitelist=นักศึกษา แต่มี Role Override → เจ้าหน้าที่</span></span>
      </button>
      <button onclick="loginAs('admin')" class="flex items-center gap-3 border border-gray-300 rounded-xl px-4 py-3 text-sm hover:bg-blue-50 hover:border-blue-300 text-left">
        <span class="text-xl">👑</span>
        <span><span class="font-semibold block">admin1@ubu.ac.th</span><span class="text-xs text-gray-500">ผู้ดูแลระบบ</span></span>
      </button>
    </div>

    <p class="text-xs font-semibold text-gray-500 mb-2">ทดสอบเงื่อนไขปฏิเสธ (Alternative Flow)</p>
    <div class="flex flex-col gap-2">
      <button onclick="rejectNotWhitelist()" class="border border-red-200 text-red-600 rounded-xl px-4 py-2 text-xs hover:bg-red-50 text-left">
        ❌ ทดลองอีเมลนอก Whitelist: outsider@gmail.com
      </button>
      <button onclick="rejectBlocked()" class="border border-red-200 text-red-600 rounded-xl px-4 py-2 text-xs hover:bg-red-50 text-left">
        🚫 ทดลองบัญชีที่ถูกระงับสิทธิ์: s002@ubu.ac.th (สมหญิง มีดี)
      </button>
    </div>

    <div id="login-error" class="hidden mt-4 border border-red-300 bg-red-50 text-red-700 text-sm rounded-lg px-3 py-2"></div>

    <a href="page-welcome.html" class="block text-center text-xs text-gray-400 mt-6 hover:underline">← กลับหน้าแรก</a>
  </div>
  <script src="../shared.js"></script>
  <script>
    function goHome() { top.location.href = "../index.html"; }
    function loginAs(role) { setRole(role); goHome(); }
    function loginAsOverride() {
      // ระบบจริง: ตรวจ Whitelist ก่อน (พบเป็น student) แล้วเช็ค Role Override ทับ (UC-34) → ได้ staff
      setRole("staff", "T001");
      goHome();
    }
    function rejectNotWhitelist() {
      const box = document.getElementById("login-error");
      box.classList.remove("hidden");
      box.textContent = "ปฏิเสธการเข้าสู่ระบบ: อีเมล outsider@gmail.com ไม่อยู่ในรายชื่อผู้มีสิทธิ์ใช้งาน (Whitelist)";
    }
    function rejectBlocked() {
      const box = document.getElementById("login-error");
      box.classList.remove("hidden");
      box.textContent = "ปฏิเสธการเข้าสู่ระบบ: บัญชี s002@ubu.ac.th ถูกระงับสิทธิ์ (Block) โดยผู้ดูแลระบบ — เหตุผล: ค้างคืนครุภัณฑ์เกินกำหนดหลายครั้ง";
    }
  </script>
</body>
</html>
