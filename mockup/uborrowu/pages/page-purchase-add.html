<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · เพิ่มรายการจัดซื้อ (UC-30)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">รายการจัดซื้อ</h1>
    <p class="text-sm text-gray-500 mb-6">เพิ่มรายการสิ่งของที่ต้องการจัดซื้อด้วยตนเอง (นอกเหนือจากคำเสนอแนะของนักศึกษา)</p>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 mb-6 space-y-3">
      <div><label class="text-sm font-semibold text-gray-700">ชื่อสิ่งของ <span class="text-red-500">*</span></label>
        <input id="f-name" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm"></div>
      <div><label class="text-sm font-semibold text-gray-700">รายละเอียด</label>
        <textarea id="f-detail" rows="2" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea></div>
      <button onclick="add()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl px-4 py-2">เพิ่มรายการ</button>
    </div>
    <h2 class="text-sm font-bold text-gray-700 mb-2">รายการทั้งหมด</h2>
    <div id="rows" class="space-y-2"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() { notifyParentPage("purchase-add"); render(); }
    function render() {
      const list = db("purchases").slice().sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""));
      document.getElementById("rows").innerHTML = list.map(p => `<div class="bg-white rounded-xl border border-gray-200 p-3 text-sm">
        <p class="font-semibold text-gray-800">${p.name}</p><p class="text-xs text-gray-500">${p.detail || ""}</p>
        <p class="text-xs text-gray-400 mt-1">เพิ่มเมื่อ ${p.created_at}</p></div>`).join("") || `<p class="text-xs text-gray-400">ยังไม่มีรายการจัดซื้อ</p>`;
    }
    function add() {
      const name = document.getElementById("f-name").value.trim();
      if (!name) { toastBanner("กรุณากรอกชื่อสิ่งของ", "error"); return; }
      const list = db("purchases");
      list.push({ id: nextId(list), name, detail: document.getElementById("f-detail").value.trim(), created_by: currentUserId(), created_at: "2026-07-23 " + new Date().toTimeString().slice(0,5) });
      dbSave("purchases", list);
      document.getElementById("f-name").value = ""; document.getElementById("f-detail").value = "";
      toastBanner("บันทึกรายการจัดซื้อสำเร็จ");
      render();
    }
  </script>
</body>
</html>
