<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · คำขอยืมที่รออนุมัติ (UC-18)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-1">
      <h1 class="text-2xl font-bold text-gray-800">คำขอยืมที่รออนุมัติ</h1>
      <div class="flex gap-2">
        <button onclick="bulkApprove()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-xl px-4 py-2">✓ อนุมัติที่เลือก</button>
        <button onclick="bulkReject()" class="bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded-xl px-4 py-2">✕ ปฏิเสธที่เลือก</button>
      </div>
    </div>
    <p class="text-sm text-gray-500 mb-6">เลือกได้ทั้งทีละรายการหรือหลายรายการพร้อมกัน — ปฏิเสธต้องระบุเหตุผลก่อนบันทึกเสมอ</p>
    <div id="rows" class="space-y-3"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() { notifyParentPage("pending-requests"); render(); }
    function render() {
      const reqs = db("requests").filter(r => r.status === "PENDING");
      const host = document.getElementById("rows");
      if (reqs.length === 0) { host.innerHTML = `<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-10 text-center"><div class="text-4xl mb-2">✅</div><p class="text-gray-600 font-semibold">ไม่มีคำขอรออนุมัติในขณะนี้</p></div>`; return; }
      host.innerHTML = reqs.map(r => {
        const stu = studentById(r.student_id);
        return `<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 flex items-start gap-3">
          <input type="checkbox" class="mt-1 sel" value="${r.id}">
          <div class="flex-1">
            <p class="text-xs text-gray-400 font-mono">คำขอ #${r.id} · ${r.created_at}</p>
            <p class="text-sm font-semibold text-gray-800">${stu ? stu.name : r.student_id} <span class="text-xs text-gray-400 font-normal font-mono">(${r.student_id})</span></p>
            <div class="text-sm text-gray-600 mt-1">${r.items.map(it => { const i = itemById(it.item_id); return `${i.image} ${i.name} × ${it.qty}`; }).join(", ")}</div>
            <p class="text-xs text-gray-400 mt-1">เหตุผล: ${r.reason}${r.use_date ? ` · วันที่ใช้งาน: ${r.use_date}` : ""}</p>
          </div>
          <div class="flex flex-col gap-2 shrink-0">
            <button onclick="approveOne(${r.id})" class="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold rounded-lg px-3 py-1.5">อนุมัติ</button>
            <button onclick="rejectOne(${r.id})" class="bg-white border border-red-300 text-red-600 hover:bg-red-50 text-xs font-semibold rounded-lg px-3 py-1.5">ปฏิเสธ</button>
          </div>
        </div>`;
      }).join("");
    }
    function approveRequest(r) {
      const items = db("items");
      r.items.forEach(it => { const item = items.find(i => i.id === it.item_id); if (item) item.qty_available = Math.max(0, item.qty_available - it.qty); });
      dbSave("items", items);
      r.status = "APPROVED_WAIT_PICKUP";
      r.approved_at = "2026-07-23 " + new Date().toTimeString().slice(0,5);
    }
    function approveOne(id) {
      const reqs = db("requests");
      const r = reqs.find(x => x.id === id);
      if (!r || r.status !== "PENDING") { toastBanner("รายการนี้ถูกยกเลิกหรือดำเนินการไปแล้ว ข้ามรายการนี้", "error"); render(); return; }
      approveRequest(r);
      dbSave("requests", reqs);
      toastBanner("อนุมัติคำขอ #" + id + " สำเร็จ");
      render();
    }
    function rejectOne(id) {
      const reason = prompt("ระบุเหตุผลการปฏิเสธคำขอ #" + id);
      if (reason === null) return;
      if (!reason.trim()) { toastBanner("ต้องระบุเหตุผลก่อนปฏิเสธ", "error"); return; }
      const reqs = db("requests");
      const r = reqs.find(x => x.id === id);
      if (!r || r.status !== "PENDING") { toastBanner("รายการนี้ถูกยกเลิกหรือดำเนินการไปแล้ว ข้ามรายการนี้", "error"); render(); return; }
      r.status = "REJECTED"; r.reject_reason = reason.trim();
      dbSave("requests", reqs);
      toastBanner("ปฏิเสธคำขอ #" + id + " แล้ว");
      render();
    }
    function selectedIds() { return [...document.querySelectorAll(".sel:checked")].map(c => Number(c.value)); }
    function bulkApprove() {
      const ids = selectedIds();
      if (ids.length === 0) { toastBanner("กรุณาเลือกรายการก่อน", "error"); return; }
      const reqs = db("requests");
      let skipped = 0, done = 0;
      ids.forEach(id => {
        const r = reqs.find(x => x.id === id);
        if (r && r.status === "PENDING") { approveRequest(r); done++; } else skipped++;
      });
      dbSave("requests", reqs);
      toastBanner(`อนุมัติสำเร็จ ${done} รายการ${skipped ? ` (ข้าม ${skipped} รายการที่ถูกยกเลิกไปแล้ว)` : ""}`);
      render();
    }
    function bulkReject() {
      const ids = selectedIds();
      if (ids.length === 0) { toastBanner("กรุณาเลือกรายการก่อน", "error"); return; }
      const reason = prompt("ระบุเหตุผลการปฏิเสธ (ใช้กับทุกรายการที่เลือก)");
      if (reason === null) return;
      if (!reason.trim()) { toastBanner("ต้องระบุเหตุผลก่อนปฏิเสธ", "error"); return; }
      const reqs = db("requests");
      let skipped = 0, done = 0;
      ids.forEach(id => {
        const r = reqs.find(x => x.id === id);
        if (r && r.status === "PENDING") { r.status = "REJECTED"; r.reject_reason = reason.trim(); done++; } else skipped++;
      });
      dbSave("requests", reqs);
      toastBanner(`ปฏิเสธสำเร็จ ${done} รายการ${skipped ? ` (ข้าม ${skipped} รายการ)` : ""}`);
      render();
    }
  </script>
</body>
</html>
