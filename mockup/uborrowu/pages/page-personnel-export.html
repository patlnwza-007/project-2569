<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU (Admin) · ส่งออกรายชื่อบุคลากร (UC-36)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:sans-serif;}</style>
</head>
<body class="bg-white min-h-screen p-4" onload="notifyParentPage('personnel-export')">
  <h1 class="text-xl font-bold mb-1">ส่งออกรายชื่อบุคลากร (CSV)</h1>
  <p class="text-xs text-gray-500 mb-4">ส่งออกรายชื่อผู้ใช้งานทั้งหมดพร้อมบทบาทปัจจุบันของแต่ละคน</p>
  <button onclick="exportCSV()" class="bg-blue-600 text-white text-sm px-4 py-2 rounded">📤 ส่งออกไฟล์ CSV</button>
  <script src="../shared.js"></script>
  <script>
    function exportCSV() {
      const overrides = db("role_overrides").filter(o => o.active);
      const overrideMap = {}; overrides.forEach(o => overrideMap[o.email] = o.role);
      let rows = [];
      db("whitelist_student").forEach(email => rows.push([email, overrideMap[email] || "student"]));
      db("whitelist_staff").forEach(email => rows.push([email, overrideMap[email] || "staff"]));
      let csv = "email,role\n" + rows.map(r => r.join(",")).join("\n") + "\n";
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "personnel_export.csv"; a.click();
      toastBanner("ส่งออกไฟล์สำเร็จ");
    }
  </script>
</body>
</html>
