<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · รายละเอียดสิ่งของ (UC-03)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-2xl mx-auto">
    <a href="page-item-list.html" class="text-sm text-blue-600 hover:underline">← กลับไปรายการสิ่งของ</a>
    <div id="content" class="mt-3"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() {
      notifyParentPage("item-detail");
      const id = Number(qparam("id"));
      const item = itemById(id);
      const host = document.getElementById("content");
      if (!item) {
        host.innerHTML = `<div class="bg-white rounded-2xl border border-gray-200 p-10 text-center mt-3">
          <div class="text-4xl mb-2">❓</div><p class="text-gray-600 font-semibold">ไม่พบสิ่งของนี้</p>
          <p class="text-xs text-gray-400 mt-1">สิ่งของนี้อาจถูกลบหรือปลดระวางไปแล้ว</p></div>`;
        return;
      }
      const cat = categoryById(item.category_id);
      const pos = positionById(item.position_id);
      const unavailable = item.base_status !== "พร้อมให้ยืม";
      const empty = !unavailable && item.qty_available === 0;
      const queue = db("queue").filter(q => q.item_id === id);
      const myPos = queue.findIndex(q => q.student_id === currentUserId()) + 1;

      host.innerHTML = `<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <div class="flex gap-5">
          <div class="text-7xl">${item.image}</div>
          <div class="flex-1">
            <h1 class="text-xl font-bold text-gray-800">${item.name}</h1>
            <p class="text-sm text-gray-500">${cat ? cat.name : ""} · ${item.type === 'equipment' ? 'ครุภัณฑ์ (ต้องคืน)' : 'วัสดุ (เบิกใช้แล้วหมดไป)'}</p>
            <div class="flex gap-2 mt-2">
              ${unavailable ? `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-gray-200 text-gray-600">ไม่พร้อมใช้งาน</span>`
                : empty ? `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-red-100 text-red-700">ถูกยืมหมด</span>`
                : `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-green-100 text-green-700">พร้อมให้ยืม</span>`}
            </div>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-3 mt-5 text-sm">
          <div class="bg-gray-50 rounded-xl p-3"><p class="text-xs text-gray-400">จำนวนคงเหลือ</p><p class="font-mono font-semibold">${item.qty_available} / ${item.qty_total}</p></div>
          <div class="bg-gray-50 rounded-xl p-3"><p class="text-xs text-gray-400">ตำแหน่งชั้นวาง</p><p class="font-semibold">${pos ? pos.name : "-"}</p></div>
          <div class="bg-gray-50 rounded-xl p-3"><p class="text-xs text-gray-400">ยืมได้สูงสุด</p><p class="font-semibold">${item.max_borrow_days ? item.max_borrow_days + " วัน" : "ไม่มีกำหนดคืน"}</p></div>
        </div>
        ${queue.length ? `<div class="mt-4 bg-yellow-50 border border-yellow-200 rounded-xl p-3 text-sm text-yellow-800">มีผู้จองคิวอยู่ ${queue.length} คน ${myPos > 0 ? `(คุณอยู่ลำดับที่ ${myPos})` : ""}</div>` : ""}
        <div class="flex gap-3 mt-6">
          <a href="page-position-map.html?id=${item.id}" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm font-semibold rounded-xl px-4 py-2">🗺️ ดูตำแหน่งชั้นวาง</a>
          ${unavailable ? "" : empty
            ? `<button onclick="joinQueue(${item.id})" class="bg-yellow-400 hover:bg-yellow-500 text-blue-900 text-sm font-semibold rounded-xl px-4 py-2">จองคิว</button>`
            : `<button onclick="addToCart(${item.id})" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl px-4 py-2">+ เพิ่มลงตะกร้า</button>`}
        </div>
      </div>`;
    }

    function addToCart(id) {
      const cart = db("cart");
      const existing = cart.find(c => c.item_id === id);
      if (existing) existing.qty += 1; else cart.push({ item_id: id, qty: 1 });
      dbSave("cart", cart);
      toastBanner("เพิ่มลงตะกร้าแล้ว");
      init();
    }
    function joinQueue(id) {
      const queue = db("queue");
      const stu = currentUserId();
      if (queue.some(q => q.item_id === id && q.student_id === stu)) { toastBanner("คุณอยู่ในคิวแล้ว", "error"); return; }
      queue.push({ id: nextId(queue), item_id: id, student_id: stu, joined_at: "2026-07-23" });
      dbSave("queue", queue);
      toastBanner("จองคิวสำเร็จ");
      init();
    }
  </script>
</body>
</html>
