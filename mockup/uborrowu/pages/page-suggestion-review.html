<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · พิจารณาคำเสนอแนะสิ่งของ (UC-29)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">คำเสนอแนะสิ่งของ</h1>
    <p class="text-sm text-gray-500 mb-6">รายการที่นักศึกษาเสนอแนะ รอพิจารณาอนุมัติ/ปฏิเสธ</p>
    <div id="rows" class="space-y-3"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() { notifyParentPage("suggestion-review"); render(); }
    function render() {
      const list = db("suggestions").filter(s => s.status === "PENDING");
      const host = document.getElementById("rows");
      if (list.length === 0) { host.innerHTML = `<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-10 text-center text-gray-500">ไม่มีคำเสนอแนะรอพิจารณา</div>`; return; }
      host.innerHTML = list.map(s => {
        const stu = studentById(s.student_id);
        return `<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4">
          <p class="text-xs text-gray-400">จาก ${stu ? stu.name : s.student_id} · ${s.created_at}</p>
          <p class="font-semibold text-gray-800">${s.name}</p>
          <p class="text-sm text-gray-600 mt-1">${s.detail}</p>
          <div class="flex gap-2 mt-3">
            <button onclick="approve(${s.id})" class="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold rounded-lg px-3 py-1.5">อนุมัติ</button>
            <button onclick="reject(${s.id})" class="bg-white border border-red-300 text-red-600 hover:bg-red-50 text-xs font-semibold rounded-lg px-3 py-1.5">ปฏิเสธ</button>
          </div>
        </div>`;
      }).join("");
    }
    function approve(id) {
      const list = db("suggestions"); const s = list.find(x => x.id === id);
      s.status = "APPROVED"; dbSave("suggestions", list);
      toastBanner("อนุมัติคำเสนอแนะแล้ว แจ้งนักศึกษาผ่านเว็บ/อีเมลแล้ว"); render();
    }
    function reject(id) {
      const reason = prompt("เหตุผลการปฏิเสธ (ไม่บังคับ)") || "";
      const list = db("suggestions"); const s = list.find(x => x.id === id);
      s.status = "REJECTED"; s.reject_reason = reason;
      dbSave("suggestions", list);
      toastBanner("ปฏิเสธคำเสนอแนะแล้ว แจ้งนักศึกษาผ่านเว็บ/อีเมลแล้ว"); render();
    }
  </script>
</body>
</html>
