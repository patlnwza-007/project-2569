<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · หน้าหลักนักศึกษา</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-1">
      <h1 class="text-2xl font-bold text-gray-800">หน้าหลัก · สถานะการยืมของฉัน</h1>
      <a href="page-item-list.html" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl px-4 py-2">+ ยืมสิ่งของใหม่</a>
    </div>
    <p class="text-sm text-gray-500 mb-6">สวัสดี <span id="student-name" class="font-semibold"></span> · ติดตามคำขอยืม-คืนทั้งหมดของคุณที่นี่</p>

    <div id="rows" class="space-y-3"></div>
  </div>

  <script src="../shared.js"></script>
  <script>
    function init() {
      notifyParentPage("student-home");
      const stu = currentStudent();
      document.getElementById("student-name").textContent = stu ? stu.name : "(พรีวิว)";
      render();
    }

    function render() {
      const stu = currentStudent();
      const items = db("items");
      const requests = db("requests").filter(r => stu && r.student_id === stu.id)
        .sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
      const host = document.getElementById("rows");

      if (!stu) {
        host.innerHTML = `<div class="bg-yellow-50 border border-yellow-300 text-yellow-800 rounded-xl p-4 text-sm">โหมดพรีวิว: ยังไม่ได้เข้าสู่ระบบเป็นนักศึกษา — เปิดผ่าน index.html แล้วเข้าสู่ระบบเพื่อดูข้อมูลจริง</div>`;
        return;
      }
      if (requests.length === 0) {
        host.innerHTML = emptyState("ยังไม่มีรายการยืม", "ไปที่รายการสิ่งของเพื่อเริ่มยืมได้เลย");
        return;
      }

      host.innerHTML = requests.map(r => {
        const itemNames = r.items.map(it => { const i = itemById(it.item_id); return i ? `${i.image} ${i.name} ×${it.qty}` : ""; }).join("<br>");
        const isEquip = r.items.some(it => itemById(it.item_id)?.type === "equipment");
        let actions = "";
        let extra = "";

        if (r.status === "PENDING") {
          actions = `<button onclick="cancelRequest(${r.id})" class="text-xs bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg px-3 py-1.5">ยกเลิกคำขอ</button>`;
        } else if (r.status === "APPROVED_WAIT_PICKUP") {
          actions = `<a href="page-confirm-pickup.html?rid=${r.id}" class="text-xs bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-3 py-1.5 inline-block">ยืนยันรับของ</a>`;
          extra = `<p class="text-xs text-amber-600 mt-1">กรุณายืนยันรับของภายใน 2 วันหลังอนุมัติ มิฉะนั้นคำขอจะหมดอายุอัตโนมัติ</p>`;
        } else if (r.status === "BORROWING") {
          const dleft = daysLeft(r.due_date);
          extra = `<p class="text-xs mt-1 ${dleft < 0 ? 'text-red-600 font-semibold' : 'text-gray-500'}">กำหนดคืน: ${r.due_date} ${dleft < 0 ? `(เกินกำหนด ${Math.abs(dleft)} วัน)` : `(อีก ${dleft} วัน)`}</p>`;
          actions = `<a href="page-notify-return.html?rid=${r.id}" class="text-xs bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-3 py-1.5 inline-block">แจ้งคืน</a>`;
        } else if (r.status === "RETURN_PENDING") {
          extra = `<p class="text-xs text-amber-600 mt-1">รอเจ้าหน้าที่ตรวจสอบและยืนยันรับคืน</p>`;
        } else if (r.status === "REJECTED") {
          extra = `<p class="text-xs text-red-600 mt-1">เหตุผล: ${r.reject_reason || "-"}</p>`;
        } else if (r.status === "RETURNED" || r.status === "ISSUED") {
          const evaluated = db("eval_responses").some(e => e.request_id === r.id);
          if (r.status === "RETURNED" && !evaluated) {
            actions = `<a href="page-evaluation.html?rid=${r.id}" class="text-xs bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-semibold rounded-lg px-3 py-1.5 inline-block">⭐ ประเมินความพึงพอใจ</a>`;
          }
        }

        return `<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 flex items-start justify-between gap-4">
          <div>
            <div class="flex items-center gap-2 mb-1">
              ${badgeHtml(r.status)}
              <span class="text-xs px-2 py-0.5 rounded-full ${isEquip ? 'bg-blue-50 text-blue-700' : 'bg-gray-100 text-gray-600'}">${isEquip ? 'ครุภัณฑ์' : 'วัสดุ'}</span>
              <span class="text-xs text-gray-400 font-mono">คำขอ #${r.id}</span>
            </div>
            <div class="text-sm text-gray-800">${itemNames}</div>
            <div class="text-xs text-gray-400 mt-1">เหตุผล: ${r.reason} · ส่งคำขอเมื่อ ${r.created_at}</div>
            ${extra}
          </div>
          <div class="shrink-0">${actions}</div>
        </div>`;
      }).join("");
    }

    function cancelRequest(id) {
      if (!confirm("ยืนยันยกเลิกคำขอยืมนี้หรือไม่?")) return;
      const reqs = db("requests");
      const r = reqs.find(x => x.id === id);
      if (r && r.status === "PENDING") {
        r.status = "CANCELLED";
        dbSave("requests", reqs);
        toastBanner("ยกเลิกคำขอยืมสำเร็จ");
        render();
      } else {
        toastBanner("คำขอนี้ถูกดำเนินการไปแล้ว ไม่สามารถยกเลิกได้", "error");
      }
    }

    function emptyState(title, sub) {
      return `<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-10 text-center">
        <div class="text-4xl mb-2">🗂️</div>
        <p class="text-gray-600 font-semibold">${title}</p>
        <p class="text-xs text-gray-400 mt-1">${sub}</p>
      </div>`;
    }
  </script>
</body>
</html>
