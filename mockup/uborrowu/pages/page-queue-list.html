<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · คิวของฉัน (UC-11)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">คิวของฉัน</h1>
    <p class="text-sm text-gray-500 mb-6">การจองคิวใหม่ทำได้ที่หน้ารายละเอียดสิ่งของ เมื่อสิ่งของถูกยืมหมด</p>
    <div id="rows" class="space-y-3"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() { notifyParentPage("queue-list"); render(); }
    function render() {
      const stu = currentUserId();
      const host = document.getElementById("rows");
      const allQueues = {};
      db("items").forEach(i => { allQueues[i.id] = db("queue").filter(q => q.item_id === i.id); });
      const mine = [];
      db("items").forEach(i => {
        const q = allQueues[i.id];
        const idx = q.findIndex(x => x.student_id === stu);
        if (idx >= 0) mine.push({ item: i, position: idx + 1, total: q.length, qid: q[idx].id });
      });
      if (mine.length === 0) {
        host.innerHTML = `<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-10 text-center"><div class="text-4xl mb-2">⏳</div><p class="text-gray-600 font-semibold">คุณไม่ได้อยู่ในคิวใดๆ ขณะนี้</p></div>`;
        return;
      }
      host.innerHTML = mine.map(m => `<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="text-3xl">${m.item.image}</div>
          <div>
            <p class="font-semibold text-sm text-gray-800">${m.item.name}</p>
            <p class="text-xs text-gray-500">ลำดับคิวของคุณ: <span class="font-mono font-semibold text-blue-700">${m.position}</span> จากทั้งหมด ${m.total} คน</p>
          </div>
        </div>
        <button onclick="leaveQueue(${m.qid})" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-xs font-semibold rounded-lg px-3 py-1.5">ออกจากคิว</button>
      </div>`).join("");
    }
    function leaveQueue(qid) {
      if (!confirm("ยืนยันออกจากคิวนี้หรือไม่?")) return;
      let queue = db("queue");
      queue = queue.filter(q => q.id !== qid);
      dbSave("queue", queue);
      toastBanner("ออกจากคิวสำเร็จ");
      render();
    }
  </script>
</body>
</html>
