<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · รายการวัสดุ/ครุภัณฑ์ (UC-01, UC-02)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">รายการวัสดุและครุภัณฑ์</h1>
    <p class="text-sm text-gray-500 mb-4">สำรวจสิ่งของทั้งหมดในคลัง ค้นหาและกรองเพื่อหาสิ่งที่ต้องการยืมได้เร็วขึ้น</p>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 mb-5 flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-[200px]">
        <label class="text-xs font-semibold text-gray-500">ค้นหาชื่อสิ่งของ</label>
        <input id="q" oninput="render()" placeholder="เช่น โปรเจกเตอร์" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500">หมวดหมู่</label>
        <select id="f-cat" onchange="render()" class="mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm"><option value="">ทั้งหมด</option></select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500">ประเภท</label>
        <select id="f-type" onchange="render()" class="mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm">
          <option value="">ทั้งหมด</option><option value="material">วัสดุ</option><option value="equipment">ครุภัณฑ์</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500">สถานะ</label>
        <select id="f-status" onchange="render()" class="mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm">
          <option value="">ทั้งหมด</option><option value="available">พร้อมให้ยืม</option><option value="empty">ถูกยืมหมด</option><option value="unavailable">ไม่พร้อมใช้งาน</option>
        </select>
      </div>
    </div>

    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </div>

  <script src="../shared.js"></script>
  <script>
    function init() {
      notifyParentPage("item-list");
      const cats = db("categories");
      document.getElementById("f-cat").innerHTML += cats.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
      render();
    }

    function render() {
      const q = document.getElementById("q").value.trim().toLowerCase();
      const fCat = document.getElementById("f-cat").value;
      const fType = document.getElementById("f-type").value;
      const fStatus = document.getElementById("f-status").value;
      let items = db("items");
      if (q) items = items.filter(i => i.name.toLowerCase().includes(q));
      if (fCat) items = items.filter(i => i.category_id === Number(fCat));
      if (fType) items = items.filter(i => i.type === fType);
      if (fStatus === "available") items = items.filter(i => i.base_status === "พร้อมให้ยืม" && i.qty_available > 0);
      if (fStatus === "empty") items = items.filter(i => i.base_status === "พร้อมให้ยืม" && i.qty_available === 0);
      if (fStatus === "unavailable") items = items.filter(i => i.base_status !== "พร้อมให้ยืม");

      const host = document.getElementById("grid");
      if (db("items").length === 0) { host.innerHTML = emptyState("ยังไม่มีรายการสิ่งของ"); return; }
      if (items.length === 0) { host.innerHTML = emptyState("ไม่พบรายการที่ค้นหา"); return; }

      host.innerHTML = items.map(i => {
        const cat = categoryById(i.category_id);
        const unavailable = i.base_status !== "พร้อมให้ยืม";
        const empty = !unavailable && i.qty_available === 0;
        let statusBadge = unavailable
          ? `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-gray-200 text-gray-600">ไม่พร้อมใช้งาน</span>`
          : empty
          ? `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-red-100 text-red-700">ถูกยืมหมด</span>`
          : `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-green-100 text-green-700">พร้อมให้ยืม</span>`;

        return `<div class="bg-white rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow p-4 cursor-pointer" onclick="location.href='page-item-detail.html?id=${i.id}'">
          <div class="flex items-center justify-between mb-2">
            <div class="text-4xl">${i.image}</div>
            ${statusBadge}
          </div>
          <p class="font-semibold text-gray-800 text-sm">${i.name}</p>
          <p class="text-xs text-gray-400">${cat ? cat.name : ""} · ${i.type === 'equipment' ? 'ครุภัณฑ์' : 'วัสดุ'}</p>
          <p class="text-xs text-gray-500 mt-1">คงเหลือ: <span class="font-mono font-semibold">${i.qty_available}</span> / ${i.qty_total}</p>
          <div class="mt-3" onclick="event.stopPropagation()">
            ${unavailable ? '' : empty
              ? `<button onclick="joinQueue(${i.id})" class="w-full bg-yellow-400 hover:bg-yellow-500 text-blue-900 text-xs font-semibold rounded-lg px-3 py-1.5">จองคิว</button>`
              : `<button onclick="addToCart(${i.id})" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-lg px-3 py-1.5">+ เพิ่มลงตะกร้า</button>`}
          </div>
        </div>`;
      }).join("");
    }

    function addToCart(id) {
      const cart = db("cart");
      const existing = cart.find(c => c.item_id === id);
      const item = itemById(id);
      if (existing) { existing.qty += 1; } else { cart.push({ item_id: id, qty: 1 }); }
      dbSave("cart", cart);
      toastBanner(`เพิ่ม "${item.name}" ลงตะกร้าแล้ว`);
    }

    function joinQueue(id) {
      const queue = db("queue");
      const stu = currentUserId();
      if (queue.some(q => q.item_id === id && q.student_id === stu)) {
        toastBanner("คุณอยู่ในคิวของสิ่งของนี้แล้ว", "error"); return;
      }
      queue.push({ id: nextId(queue), item_id: id, student_id: stu, joined_at: "2026-07-23 " + new Date().toTimeString().slice(0,5) });
      dbSave("queue", queue);
      const myPos = queue.filter(q => q.item_id === id).findIndex(q => q.student_id === stu) + 1;
      toastBanner(`จองคิวสำเร็จ คุณอยู่ลำดับที่ ${myPos}`);
    }

    function emptyState(title) {
      return `<div class="col-span-full bg-white rounded-2xl border border-dashed border-gray-300 p-10 text-center">
        <div class="text-4xl mb-2">📭</div><p class="text-gray-600 font-semibold">${title}</p>
      </div>`;
    }
  </script>
</body>
</html>
