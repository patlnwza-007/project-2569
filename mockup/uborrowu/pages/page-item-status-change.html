<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORROWU · เปลี่ยนสถานะครุภัณฑ์ (UC-24)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Thai',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen p-6" onload="init()">
  <div class="max-w-xl mx-auto">
    <a href="page-item-overview.html" class="text-sm text-blue-600 hover:underline">← กลับภาพรวมคลัง</a>
    <div id="content" class="mt-3"></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    function init() {
      notifyParentPage("item-status-change");
      const id = Number(qparam("id"));
      const item = itemById(id);
      const host = document.getElementById("content");
      if (!item) { host.innerHTML = `<div class="bg-white rounded-2xl border p-8 text-center text-gray-500">ไม่พบสิ่งของนี้</div>`; return; }
      const borrowing = db("requests").some(r => r.status === "BORROWING" && r.items.some(it => it.item_id === id));
      host.innerHTML = `<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h1 class="text-lg font-bold text-gray-800 mb-1">${item.image} ${item.name}</h1>
        <p class="text-sm text-gray-500 mb-4">สถานะปัจจุบัน: ${item.base_status}</p>
        ${borrowing ? `<div class="bg-red-50 border border-red-300 text-red-700 rounded-lg p-3 text-sm">ไม่สามารถเปลี่ยนสถานะได้ เนื่องจากครุภัณฑ์นี้กำลังถูกยืมอยู่ กรุณารอจนกว่าจะมีการคืน</div>`
        : `<label class="text-sm font-semibold text-gray-700">เลือกสถานะใหม่</label>
        <select id="f-status" class="w-full mt-1 border border-gray-300 rounded-lg px-3 py-2 text-sm mb-4">
          <option value="พร้อมให้ยืม">พร้อมให้ยืม (ปกติ)</option>
          <option value="ชำรุด">ชำรุด</option><option value="เลิกใช้งาน">เลิกใช้งาน</option><option value="ปลดระวาง">ปลดระวาง</option>
        </select>
        <button onclick="save(${id})" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl px-5 py-2">บันทึกสถานะใหม่</button>`}
      </div>`;
      if (!borrowing) document.getElementById("f-status").value = item.base_status;
    }
    function save(id) {
      const items = db("items");
      const item = items.find(i => i.id === id);
      const newStatus = document.getElementById("f-status").value;
      item.base_status = newStatus;
      dbSave("items", items);
      toastBanner("บันทึกสถานะใหม่สำเร็จ (ประวัติการยืม-คืนเดิมยังคงอยู่)");
      setTimeout(() => location.href = "page-item-overview.html", 700);
    }
  </script>
</body>
</html>
